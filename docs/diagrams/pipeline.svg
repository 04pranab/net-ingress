<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 160" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#0d1117">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- netbuf -->
  <rect x="20" y="50" width="110" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="76" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">netbuf</text>
  <text x="75" y="95" text-anchor="middle" fill="#8b949e" font-size="11">ring buffer</text>

  <line x1="130" y1="80" x2="152" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- packet -->
  <rect x="152" y="50" width="110" height="60" rx="8" fill="#1a1f35" stroke="#3d4580" stroke-width="1"/>
  <text x="207" y="76" text-anchor="middle" fill="#c9d1e8" font-size="13" font-weight="600">packet</text>
  <text x="207" y="95" text-anchor="middle" fill="#8088b0" font-size="11">cursor + meta</text>

  <line x1="262" y1="80" x2="284" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ipv4 -->
  <rect x="284" y="50" width="110" height="60" rx="8" fill="#1a2f2a" stroke="#2d6b5e" stroke-width="1"/>
  <text x="339" y="76" text-anchor="middle" fill="#b8e0d4" font-size="13" font-weight="600">ipv4</text>
  <text x="339" y="95" text-anchor="middle" fill="#6baa98" font-size="11">parse + verify</text>

  <!-- fork up to icmp -->
  <path d="M394 68 L420 68 L420 38 L452 38" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- fork down to tcp -->
  <path d="M394 92 L420 92 L420 122 L452 122" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- icmp -->
  <rect x="452" y="18" width="90" height="40" rx="8" fill="#2a1f1a" stroke="#7a4030" stroke-width="1"/>
  <text x="497" y="43" text-anchor="middle" fill="#e8c4b8" font-size="13" font-weight="600">icmp</text>

  <!-- tcp -->
  <rect x="452" y="102" width="90" height="40" rx="8" fill="#2a1f1a" stroke="#7a4030" stroke-width="1"/>
  <text x="497" y="127" text-anchor="middle" fill="#e8c4b8" font-size="13" font-weight="600">tcp</text>

  <!-- rejoin -->
  <path d="M542 38 L568 38 L568 68" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M542 122 L568 122 L568 92" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- dispatch -->
  <rect x="548" y="50" width="120" height="60" rx="8" fill="#1a2035" stroke="#3060a0" stroke-width="1"/>
  <text x="608" y="76" text-anchor="middle" fill="#b8cce8" font-size="13" font-weight="600">dispatch</text>
  <text x="608" y="95" text-anchor="middle" fill="#6888b8" font-size="11">route by proto</text>

  <line x1="668" y1="80" x2="690" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- net_stats -->
  <rect x="690" y="50" width="120" height="60" rx="8" fill="#2a2310" stroke="#7a6020" stroke-width="1"/>
  <text x="750" y="76" text-anchor="middle" fill="#e8d8a0" font-size="13" font-weight="600">net_stats</text>
  <text x="750" y="95" text-anchor="middle" fill="#a89060" font-size="11">counters</text>

  <!-- entry label -->
  <text x="20" y="32" fill="#8b949e" font-size="11">raw bytes in ↓</text>
</svg>
