<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 220" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#0d1117">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="430" y="22" text-anchor="middle" fill="#8b949e" font-size="11">ring buffer — 8 slots shown (NETBUF_SLOT_COUNT = 16)</text>

  <!-- occupied slots 0,1,2 -->
  <rect x="40"  y="50" width="90" height="60" rx="4" fill="#1a2f2a" stroke="#2d6b5e" stroke-width="1"/>
  <text x="85"  y="75" text-anchor="middle" fill="#b8e0d4" font-size="13" font-weight="600">slot 0</text>
  <text x="85"  y="93" text-anchor="middle" fill="#6baa98" font-size="11">occupied</text>

  <rect x="138" y="50" width="90" height="60" rx="4" fill="#1a2f2a" stroke="#2d6b5e" stroke-width="1"/>
  <text x="183" y="75" text-anchor="middle" fill="#b8e0d4" font-size="13" font-weight="600">slot 1</text>
  <text x="183" y="93" text-anchor="middle" fill="#6baa98" font-size="11">occupied</text>

  <rect x="236" y="50" width="90" height="60" rx="4" fill="#1a2f2a" stroke="#2d6b5e" stroke-width="1"/>
  <text x="281" y="75" text-anchor="middle" fill="#b8e0d4" font-size="13" font-weight="600">slot 2</text>
  <text x="281" y="93" text-anchor="middle" fill="#6baa98" font-size="11">occupied</text>

  <!-- free slots 3-7 -->
  <rect x="334" y="50" width="90" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="379" y="75" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">slot 3</text>
  <text x="379" y="93" text-anchor="middle" fill="#8b949e" font-size="11">free</text>

  <rect x="432" y="50" width="90" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="477" y="75" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">slot 4</text>
  <text x="477" y="93" text-anchor="middle" fill="#8b949e" font-size="11">free</text>

  <rect x="530" y="50" width="90" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="575" y="75" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">slot 5</text>
  <text x="575" y="93" text-anchor="middle" fill="#8b949e" font-size="11">free</text>

  <rect x="628" y="50" width="90" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="673" y="75" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">slot 6</text>
  <text x="673" y="93" text-anchor="middle" fill="#8b949e" font-size="11">free</text>

  <rect x="726" y="50" width="90" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="771" y="75" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">slot 7</text>
  <text x="771" y="93" text-anchor="middle" fill="#8b949e" font-size="11">free</text>

  <!-- head pointer -->
  <line x1="85" y1="110" x2="85" y2="136" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="152" text-anchor="middle" fill="#3fb950" font-size="11">head (read)</text>

  <!-- tail pointer -->
  <line x1="379" y1="110" x2="379" y2="136" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="379" y="152" text-anchor="middle" fill="#58a6ff" font-size="11">tail (write)</text>

  <!-- wrap-around dashed arc -->
  <path d="M816 80 Q840 80 840 180 Q840 196 40 196 Q20 196 20 80 Q20 58 40 58" fill="none" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="430" y="212" text-anchor="middle" fill="#8b949e" font-size="11">wraps around — next index = (current + 1) % NETBUF_SLOT_COUNT</text>
</svg>
